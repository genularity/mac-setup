# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core behaviour ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour
set -g history-limit 50000
set -g buffer-limit 20
set -g display-time 2000
set -g remain-on-exit off
set -g repeat-time 300
set -sg escape-time 0                              # no delay on escape key
set -g focus-events on
set -g mouse on

# ── Numbering ─────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on                         # close window 2 → window 3 becomes 2

# ── Window titles ─────────────────────────────────────────────────────────────
set -g set-titles on
set -g set-titles-string "#S · #W"
setw -g automatic-rename on
setw -g automatic-rename-format "#{?pane_in_mode,[#{pane_mode}],#{pane_current_command}}"

# ── Vi mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
# y is handled by tmux-yank

# ── Pane splitting ─────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching — works with vim/neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r M-h resize-pane -L 2
bind -r M-l resize-pane -R 2
bind -r M-k resize-pane -U 2
bind -r M-j resize-pane -D 2

# ── Window navigation ─────────────────────────────────────────────────────────
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window
bind -r [ previous-window
bind -r ] next-window

# ── Session management ─────────────────────────────────────────────────────────
bind S choose-session
bind C-s new-session
bind X confirm-before -p "kill session #S? (y/n)" kill-session

# ── Reload config ─────────────────────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# ── Synchronise panes (broadcast) ─────────────────────────────────────────────
bind * setw synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# ── Layout shortcuts ──────────────────────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ── Clipboard — handled by tmux-yank plugin (see Plugins section) ─────────────
# tmux-yank auto-detects pbcopy (macOS) / xclip / xsel (Linux) / wl-copy (Wayland)

# ── Colours ───────────────────────────────────────────────────────────────────
# Tokyo Night — matches iTerm2 profile, bat theme, and overall setup
color_bg="#1a1c30"
color_bg1="#1e2030"
color_bg2="#2b304d"
color_fg="#c4cbe4"
color_fg2="#a9b1d6"
color_dim="#565f89"
color_red="#f77878"
color_green="#94d48c"
color_yellow="#e2c573"
color_blue="#7ba5eb"
color_purple="#bb78d6"
color_cyan="#7dd5cc"
color_orange="#ff9e64"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#{color_bg2}"
set -g pane-active-border-style "fg=#{color_blue}"
set -g pane-border-status off

# ── Message bar ───────────────────────────────────────────────────────────────
set -g message-style "fg=#{color_yellow},bg=#{color_bg1},bold"
set -g message-command-style "fg=#{color_blue},bg=#{color_bg1}"

# ── Mode style (copy mode) ────────────────────────────────────────────────────
set -g mode-style "fg=#{color_bg},bg=#{color_yellow}"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#{color_fg2},bg=#{color_bg1}"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#{color_bg},bg=#{color_blue},bold] #S #[fg=#{color_blue},bg=#{color_bg1},nobold]"

# Right: PREFIX indicator only
set -g status-right-length 20
set -g status-right "#{?client_prefix,#[fg=#{color_orange},bg=#{color_bg1},bold] ⌨ PREFIX ,}"

# Window tabs
setw -g window-status-style "fg=#{color_dim},bg=#{color_bg1}"
setw -g window-status-format " #I #W#{?window_zoomed_flag, ⬡,} "
setw -g window-status-separator ""

setw -g window-status-current-style "fg=#{color_bg},bg=#{color_blue},bold"
setw -g window-status-current-format "#[fg=#{color_bg1},bg=#{color_blue}]#[fg=#{color_bg},bg=#{color_blue},bold] #I #W#{?window_zoomed_flag, ⬡,} #[fg=#{color_blue},bg=#{color_bg1},nobold]"

setw -g window-status-bell-style "fg=#{color_yellow},bg=#{color_bg1},bold"
setw -g window-status-activity-style "fg=#{color_orange},bg=#{color_bg1}"

# ── Quick layouts ─────────────────────────────────────────────────────────────
# ,d  — dev layout: editor left, terminal top-right, logs bottom-right
bind d run-shell "
  tmux split-window -h -p 40 -c '#{pane_current_path}';
  tmux split-window -v -p 40 -c '#{pane_current_path}';
  tmux select-pane -t 1
"

# ,m  — monitor layout: 4 equal panes
bind m run-shell "
  tmux split-window -h -c '#{pane_current_path}';
  tmux split-window -v -c '#{pane_current_path}';
  tmux select-pane -t 1;
  tmux split-window -v -c '#{pane_current_path}';
  tmux select-pane -t 1
"

# ── Useful shortcuts ─────────────────────────────────────────────────────────
bind e new-window -n "edit" "$EDITOR ~/.tmux.conf"    # edit this file
bind b set -g status                                   # toggle status bar
bind z resize-pane -Z                                  # zoom current pane (also prefix + z)
bind q display-panes -d 2000                           # show pane numbers
bind p paste-buffer
bind / copy-mode \; send -X search-backward ""         # search up

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# Resurrect: save/restore sessions across reboots
# prefix Ctrl+s = save  |  prefix Ctrl+r = restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'           # restore neovim sessions too

# Fingers: highlight and copy IPs, URLs, paths, hashes from screen
# prefix F = activate
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key F

# Yank: copy to system clipboard from copy mode (auto-detects pbcopy/xclip/wl-copy)
# y = copy selection  |  Y = copy current line  |  prefix y = copy pane cwd
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe-and-cancel'

# Auto-install plugins on first run (if tpm was just cloned)
if "test ! -d ~/.tmux/plugins/tmux-fingers" \
  "run '~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
